<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#111}
      .label{font:600 18px Arial,sans-serif;fill:#111;text-anchor:middle}
      .small{font:15px Arial,sans-serif;fill:#222;text-anchor:middle}
      .actor{stroke:#222;stroke-width:3;fill:none}
      .boundary{fill:#fbfdff;stroke:#1b6a84;stroke-width:3}
      .usecase{fill:#f8fbfd;stroke:#1b6a84;stroke-width:2.5}
      .external{fill:#fff8f3;stroke:#e56b2e;stroke-width:2.5}
      .db{fill:#f4edf8;stroke:#9b62a8;stroke-width:2.5}
      .line{stroke:#333;stroke-width:2.2;fill:none}
      .dash{stroke:#555;stroke-width:2;stroke-dasharray:7 7;fill:none}
      .note{font:14px Arial,sans-serif;fill:#444;text-anchor:middle}
    </style>
  </defs>
  <rect width="1600" height="1050" fill="#ffffff"/>
  <text x="60" y="70" class="title">Use Case Diagram - F1 Telemetry Dashboard</text>

  <rect x="315" y="120" width="1030" height="850" rx="8" class="boundary"/>
  <text x="830" y="158" class="label">F1 Telemetry Dashboard</text>

  <circle cx="145" cy="335" r="28" class="actor"/>
