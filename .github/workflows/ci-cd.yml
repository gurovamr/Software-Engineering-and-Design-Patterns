name: Python CI/CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Display repository structure
      run: |
        echo "Repository structure:"
        find . -type f -name "*.py" | grep -v __pycache__ | head -20

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,env,.venv,.git,__pycache__ || true

    - name: Run tests (if any exist)
      run: |
        if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
          echo "Tests found, running pytest..."
          pytest -v
        else
          echo "No tests found yet. Skipping test execution."
        fi

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel

    - name: Build package
      run: python -m build
      continue-on-error: true

    - name: Archive build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

