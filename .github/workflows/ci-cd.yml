name: Python CI/CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Display Python version and structure
      run: |
        python --version
        echo "Repository structure:"
        ls -la
        echo "Looking for test files:"
        find . -name "*test*.py" -o -name "test_*.py" | head -20

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        echo "Installed packages:"
        pip list

    - name: Lint with flake8
      run: |
        echo "Running flake8 checks..."
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,env,.venv,.git,__pycache__
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,env,.venv,.git,__pycache__
      continue-on-error: true

    - name: Run tests with pytest
      run: |
        echo "Current directory: $(pwd)"
        echo "Python path: $PYTHONPATH"
        echo "Running pytest with verbose output..."
        pytest -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing || EXIT_CODE=$?
        if [ -z "$EXIT_CODE" ]; then
          EXIT_CODE=0
        fi
        echo "Pytest exit code: $EXIT_CODE"
        if [ $EXIT_CODE -eq 5 ]; then
          echo "WARNING: No tests were collected. This might be expected if you don't have tests yet."
          exit 0
        fi
        exit $EXIT_CODE

    - name: Upload coverage reports
      if: success()
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel

    - name: Build package
      run: python -m build
      continue-on-error: true

    - name: Archive build artifacts
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/
