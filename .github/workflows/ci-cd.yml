name: Python CI/CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        miniforge-version: latest
        use-mamba: true
        mamba-version: "*"
        activate-environment: test-env
        environment-file: environment.yml
        auto-activate-base: false

    - name: Display environment info
      shell: bash -l {0}
      run: |
        echo "============================================"
        echo "CONDA ENVIRONMENT INFO"
        echo "============================================"
        conda info
        conda list
        echo "============================================"
        echo ""

    - name: Display repository structure
      shell: bash -l {0}
      run: |
        echo "============================================"
        echo "REPOSITORY STRUCTURE"
        echo "============================================"
        echo "Current directory: $(pwd)"
        ls -laR
        echo ""
        echo "Test files:"
        find . -name "test_*.py" -o -name "*_test.py"
        echo "============================================"
        echo ""

    - name: Install test dependencies
      shell: bash -l {0}
      run: |
        echo "Installing pytest and testing tools..."
        mamba install -c conda-forge pytest pytest-cov flake8 -y
        echo ""
        echo "Final package list:"
        conda list

    - name: Lint with flake8
      shell: bash -l {0}
      run: |
        echo "============================================"
        echo "RUNNING FLAKE8"
        echo "============================================"
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
          --exclude=venv,env,.venv,.git,__pycache__,.pytest_cache || true
        echo ""
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
          --statistics --exclude=venv,env,.venv,.git,__pycache__,.pytest_cache || true
        echo "============================================"
        echo ""
      continue-on-error: true

    - name: Run pytest
      shell: bash -l {0}
      run: |
        echo "============================================"
        echo "RUNNING PYTEST"
        echo "============================================"
        pytest -vvv --tb=long --capture=no --showlocals -ra 2>&1 || EXIT_CODE=$?

        if [ -z "$EXIT_CODE" ]; then
          EXIT_CODE=0
        fi

        echo ""
        echo "============================================"
        echo "Pytest exit code: $EXIT_CODE"
        echo "============================================"

        if [ $EXIT_CODE -eq 5 ]; then
          echo "⚠ No tests were collected"
          exit 0
        elif [ $EXIT_CODE -ne 0 ]; then
          echo "✗ Tests failed"
          exit $EXIT_CODE
        fi

        echo "✓ All tests passed"
        exit 0

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: '3.11'
        miniforge-version: latest
        use-mamba: true
        activate-environment: build-env
        environment-file: environment.yml

    - name: Install build tools
      shell: bash -l {0}
      run: |
        echo "Installing build dependencies..."
        mamba install -c conda-forge build wheel -y

    - name: Build package
      shell: bash -l {0}
      run: |
        echo "============================================"
        echo "BUILDING PACKAGE"
        echo "============================================"
        python -m build -v 2>&1 || echo "Build failed (continuing...)"
        echo ""
        if [ -d dist/ ]; then
          echo "Build artifacts:"
          ls -lah dist/
        fi
        echo "============================================"
      continue-on-error: true

    - name: Archive build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
